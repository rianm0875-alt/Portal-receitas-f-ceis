&lt;html lang=&quot;pt-BR&quot;&gt;
  &lt;head&gt;
    &lt;meta charset=&quot;utf-8&quot;&gt;
    &lt;meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1&quot;&gt;
    &lt;title&gt;Portal receitas faceis&lt;/title&gt;
    &lt;style&gt;
:root {
  --ink: #22201d;
  --muted: #6f6760;
  --paper: #fffaf2;
  --panel: #ffffff;
  --line: #e8ded2;
  --tomato: #cf3f2e;
  --leaf: #2f7d58;
  --honey: #f0b84b;
  --shadow: 0 18px 50px rgba(54, 38, 22, 0.14);
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: Arial, Helvetica, sans-serif;
}
img { display: block; max-width: 100%; }
button, input, select, textarea { font: inherit; }

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 16px clamp(18px, 4vw, 56px);
  background: rgba(255, 250, 242, 0.92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(16px);
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--ink);
  font-weight: 800;
  text-decoration: none;
}
.brand-mark {
  display: grid;
  width: 34px;
  height: 34px;
  place-items: center;
  border-radius: 8px;
  color: #fff;
  background: var(--tomato);
}
.nav { display: flex; align-items: center; gap: 18px; font-size: 0.95rem; }
.nav a { color: var(--muted); text-decoration: none; }
.nav a:hover { color: var(--tomato); }

.hero {
  min-height: 76vh;
  display: grid;
  align-items: end;
  padding: clamp(72px, 10vw, 140px) clamp(18px, 4vw, 56px) 44px;
  color: #fff;
  background:
    linear-gradient(90deg, rgba(26, 21, 17, 0.78), rgba(26, 21, 17, 0.28)),
    url(&quot;https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&amp;fit=crop&amp;w=1800&amp;q=85&quot;) center / cover;
}
.hero-copy { width: min(720px, 100%); }
.eyebrow {
  margin: 0 0 10px;
  color: var(--tomato);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}
.hero .eyebrow { color: var(--honey); }
h1, h2, h3, p { margin-top: 0; }
h1 {
  max-width: 760px;
  margin-bottom: 18px;
  font-size: clamp(2.5rem, 7vw, 5.8rem);
  line-height: 0.95;
}
h2 { margin-bottom: 10px; font-size: clamp(2rem, 4vw, 3.1rem); line-height: 1; }
h3 { margin-bottom: 10px; }
.hero p {
  max-width: 620px;
  color: rgba(255, 255, 255, 0.88);
  font-size: 1.12rem;
  line-height: 1.55;
}

.search-panel {
  width: min(680px, 100%);
  margin-top: 28px;
  padding: 14px;
  background: rgba(255, 255, 255, 0.14);
  border: 1px solid rgba(255, 255, 255, 0.26);
  border-radius: 8px;
  backdrop-filter: blur(16px);
}
.search-panel label {
  display: block;
  margin: 0 0 8px;
  font-size: 0.82rem;
  font-weight: 800;
  text-transform: uppercase;
}
.search-row { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
.search-row input, .submit-form input, .submit-form select, .submit-form textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
}
.search-row input { min-height: 48px; padding: 0 16px; border-color: transparent; }
.search-row button, .submit-form button, .recipe-card button, .spotlight-actions a, .spotlight-actions button {
  min-height: 48px;
  padding: 0 18px;
  border: 0;
  border-radius: 8px;
  color: #fff;
  background: var(--tomato);
  cursor: pointer;
}
.spotlight-actions a,
.spotlight-actions button {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
}

.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--line);
  border-bottom: 1px solid var(--line);
}
.stats div { padding: 26px clamp(18px, 4vw, 56px); background: #fff; }
.stats strong { display: block; margin-bottom: 5px; font-size: 2rem; }
.stats span { color: var(--muted); }

.section { padding: clamp(56px, 7vw, 96px) clamp(18px, 4vw, 56px); }
.section-heading { max-width: 820px; margin-bottom: 28px; }
.spotlight-section { background: #fffaf2; }
.spotlight-card {
  display: grid;
  grid-template-columns: minmax(260px, 0.82fr) minmax(0, 1fr);
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: var(--shadow);
}
.spotlight-card img {
  width: 100%;
  height: 100%;
  min-height: 340px;
  object-fit: cover;
}
.spotlight-copy {
  display: grid;
  align-content: center;
  padding: clamp(26px, 5vw, 56px);
}
.spotlight-copy p {
  color: var(--muted);
  line-height: 1.6;
}
.spotlight-actions {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 14px;
  margin-top: 12px;
}
.spotlight-actions span {
  color: var(--leaf);
  font-weight: 800;
}
.carousel-section {
  background: #fff;
  border-block: 1px solid var(--line);
}
.carousel-shell {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 12px;
}
.carousel-track {
  display: grid;
  grid-auto-columns: minmax(230px, 31%);
  grid-auto-flow: column;
  gap: 14px;
  overflow-x: auto;
  scroll-behavior: smooth;
  scrollbar-width: thin;
  padding: 4px 2px 14px;
}
.carousel-item {
  position: relative;
  min-height: 280px;
  overflow: hidden;
  border: 0;
  border-radius: 8px;
  color: #fff;
  background: #222;
  cursor: pointer;
  text-align: left;
}
.carousel-item img {
  width: 100%;
  height: 100%;
  min-height: 280px;
  object-fit: cover;
  transition: transform 180ms ease;
}
.carousel-item:hover img {
  transform: scale(1.04);
}
.carousel-caption {
  position: absolute;
  inset: auto 0 0;
  padding: 54px 16px 16px;
  background: linear-gradient(0deg, rgba(20, 16, 12, 0.82), rgba(20, 16, 12, 0));
}
.carousel-caption strong {
  display: block;
  margin-bottom: 5px;
  font-size: 1.05rem;
}
.carousel-caption span {
  color: rgba(255, 255, 255, 0.82);
}
.carousel-control {
  display: grid;
  width: 42px;
  height: 42px;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: #fff;
  cursor: pointer;
  font-size: 1.5rem;
}
.category-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }
.category-card {
  min-height: 130px;
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
}
.category-title-button {
  display: block;
  margin: 0 0 8px;
  padding: 0;
  border: 0;
  color: var(--ink);
  background: transparent;
  cursor: pointer;
  font-size: 1.1rem;
  font-weight: 800;
  text-align: left;
}
.category-card span { color: var(--muted); line-height: 1.45; }
.category-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}
.category-actions button {
  min-height: 32px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--muted);
  background: #fffaf2;
  cursor: pointer;
}
.category-actions button:hover {
  color: #fff;
  border-color: var(--leaf);
  background: var(--leaf);
}
.category-actions button.active {
  color: #fff;
  border-color: var(--tomato);
  background: var(--tomato);
}

.recipes-section { background: #fff; border-block: 1px solid var(--line); }
.toolbar { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
.filter {
  min-height: 40px;
  padding: 0 15px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: #fff;
  cursor: pointer;
}
.filter.active { color: #fff; border-color: var(--leaf); background: var(--leaf); }
.smart-filters {
  display: flex;
  flex-wrap: wrap;
  align-items: end;
  gap: 14px;
  margin-bottom: 24px;
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fffaf2;
}
.smart-filters label {
  display: grid;
  gap: 6px;
  min-width: 160px;
  color: var(--muted);
  font-weight: 800;
}
.smart-filters select {
  min-height: 42px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  background: #fff;
}
.smart-filters span {
  margin-left: auto;
  color: var(--muted);
  font-weight: 800;
}
.clear-topic {
  min-height: 42px;
  padding: 0 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--muted);
  background: #fff;
  cursor: pointer;
}
.clear-topic:hover {
  color: #fff;
  border-color: var(--tomato);
  background: var(--tomato);
}
.recipe-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
.recipe-card {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  box-shadow: 0 10px 26px rgba(35, 27, 19, 0.08);
}
.recipe-card img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; }
.recipe-card-content { padding: 18px; }
.recipe-card h3 { font-size: 1.22rem; }
.recipe-card p { min-height: 52px; color: var(--muted); line-height: 1.45; }
.card-actions {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
}
.recipe-card .favorite-button {
  min-width: 112px;
  color: var(--tomato);
  border: 1px solid var(--line);
  background: #fff;
}
.recipe-card .favorite-button.active {
  color: #fff;
  border-color: var(--tomato);
  background: var(--tomato);
}
.meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
.meta span, .detail-meta span {
  padding: 7px 9px;
  border-radius: 8px;
  background: #f6efe6;
  color: #5a4a3f;
  font-size: 0.86rem;
}

.recipe-detail {
  position: fixed;
  inset: 0 0 0 auto;
  z-index: 40;
  width: min(540px, 100%);
  overflow-y: auto;
  background: #fff;
  box-shadow: var(--shadow);
  transform: translateX(105%);
  transition: transform 180ms ease;
}
.recipe-detail.open { transform: translateX(0); }
.close-detail {
  position: absolute;
  top: 14px;
  right: 14px;
  display: grid;
  width: 38px;
  height: 38px;
  place-items: center;
  border: 0;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.9);
  cursor: pointer;
}
.recipe-detail img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; }
.detail-body { padding: 28px; }
.detail-body p, .detail-body li { color: var(--muted); line-height: 1.55; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 8px; margin: 18px 0 24px; }

.favorites-section {
  background: #fffaf2;
}
.favorites-list {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}
.favorite-item,
.menu-grid article {
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
}
.favorite-item strong,
.menu-grid strong {
  display: block;
  margin-bottom: 6px;
}
.favorite-item span,
.menu-grid span,
.empty {
  color: var(--muted);
}
.menu-section {
  background: #fff;
}
.menu-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 12px;
}
.menu-grid span {
  display: block;
  margin-bottom: 8px;
  font-size: 0.86rem;
  font-weight: 800;
  text-transform: uppercase;
}

.submit-section {
  display: grid;
  grid-template-columns: minmax(0, 0.9fr) minmax(320px, 0.7fr);
  gap: 32px;
  align-items: start;
}
.submit-copy p { color: var(--muted); line-height: 1.6; }
.submit-form {
  display: grid;
  gap: 14px;
  padding: 22px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
}
.submit-form label { display: grid; gap: 7px; color: var(--muted); font-weight: 700; }
.submit-form input, .submit-form select, .submit-form textarea {
  padding: 12px 13px;
  color: var(--ink);
  resize: vertical;
}
.footer {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  padding: 24px clamp(18px, 4vw, 56px);
  color: var(--muted);
  border-top: 1px solid var(--line);
}
.footer span:first-child { color: var(--ink); font-weight: 800; }

@media (max-width: 900px) {
  .category-grid, .recipe-grid, .submit-section, .favorites-list, .menu-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .spotlight-card { grid-template-columns: 1fr; }
}
@media (max-width: 680px) {
  .topbar, .footer { align-items: flex-start; flex-direction: column; }
  .nav { width: 100%; justify-content: space-between; gap: 10px; font-size: 0.9rem; }
  .hero { min-height: 72vh; padding-top: 88px; }
  .search-row, .stats, .category-grid, .recipe-grid, .submit-section, .favorites-list, .menu-grid, .card-actions { grid-template-columns: 1fr; }
  .smart-filters span { margin-left: 0; }
  .carousel-shell { grid-template-columns: 1fr; }
  .carousel-control { display: none; }
  .carousel-track { grid-auto-columns: 82%; }
}

function getImageForRecipe(title, category) {
  if (customRecipeImages[title]) return customRecipeImages[title];
  const normalizedTitle = title.toLowerCase();
  const match = imageKeywords.find(([term]) =&gt; normalizedTitle.includes(term));
  const keyword = match ? `${title} ${match[1]}` : `${title} ${category}`;
  const imageLock = title.split(&quot;&quot;).reduce((total, letter) =&gt; total + letter.charCodeAt(0), 0);
  return `https://loremflickr.com/900/700/${encodeURIComponent(keyword)},prepared-food,plate?lock=${imageLock}`;
}

const recipes = recipeFamilies.flatMap(([category, titles, ingredients, time, level], familyIndex) =&gt;
  titles.map((title, titleIndex) =&gt; ({
    id: `r-${familyIndex}-${titleIndex}`,
    title,
    category,
    description: `${title} com preparo simples, ingredientes faceis de encontrar e passo a passo direto.`,
    time: `${time + titleIndex * 5} min`,
    timeMinutes: time + titleIndex * 5,
    level,
    servings: titleIndex === 2 ? &quot;4 porcoes&quot; : &quot;2 a 4 porcoes&quot;,
    image: getImageForRecipe(title, category),
    ingredients,
    steps: [
      &quot;Separe os ingredientes e deixe tudo medido antes de comecar.&quot;,
      &quot;Prepare a base da receita em fogo medio ou forno preaquecido, conforme o prato pedir.&quot;,
      &quot;Adicione os temperos aos poucos e prove para ajustar sal, textura e sabor.&quot;,
      &quot;Finalize quando estiver cozido, dourado ou cremoso, e sirva ainda fresco.&quot;
    ]
  }))
);

const categoryGrid = document.querySelector(&quot;#categoryGrid&quot;);
const recipeGrid = document.querySelector(&quot;#recipeGrid&quot;);
const filters = document.querySelectorAll(&quot;.filter&quot;);
const searchForm = document.querySelector(&quot;#searchForm&quot;);
const searchInput = document.querySelector(&quot;#searchInput&quot;);
const timeFilter = document.querySelector(&quot;#timeFilter&quot;);
const levelFilter = document.querySelector(&quot;#levelFilter&quot;);
const recipeCount = document.querySelector(&quot;#recipeCount&quot;);
const favoritesList = document.querySelector(&quot;#favoritesList&quot;);
const carouselTrack = document.querySelector(&quot;#carouselTrack&quot;);
const carouselPrev = document.querySelector(&quot;#carouselPrev&quot;);
const carouselNext = document.querySelector(&quot;#carouselNext&quot;);
const clearTopic = document.querySelector(&quot;#clearTopic&quot;);
const detail = document.querySelector(&quot;#recipeDetail&quot;);
const closeDetail = document.querySelector(&quot;#closeDetail&quot;);
const dailyButton = document.querySelector(&quot;#dailyButton&quot;);

let activeFilter = &quot;Todas&quot;;
let searchTerm = &quot;&quot;;
let activeTopic = &quot;&quot;;
let activeTopicTerms = [];
let activeTime = &quot;Todos&quot;;
let activeLevel = &quot;Todas&quot;;
let favorites = JSON.parse(localStorage.getItem(&quot;portalReceitasFaceisFavoritas&quot;) || &quot;[]&quot;);
let dailyRecipe = recipes[0];

function renderCategories() {
  categoryGrid.innerHTML = categories
    .map(([name, text, examples]) =&gt; `
      &lt;article class=&quot;category-card&quot;&gt;
        &lt;button class=&quot;category-title-button&quot; type=&quot;button&quot; data-category=&quot;${name}&quot;&gt;${name}&lt;/button&gt;
        &lt;span&gt;${text}&lt;/span&gt;
        &lt;div class=&quot;category-actions&quot;&gt;
          ${examples.map((example) =&gt; `&lt;button type=&quot;button&quot; data-category=&quot;${name}&quot; data-topic=&quot;${example}&quot;&gt;${example}&lt;/button&gt;`).join(&quot;&quot;)}
        &lt;/div&gt;
      &lt;/article&gt;
    `)
    .join(&quot;&quot;);

  categoryGrid.querySelectorAll(&quot;[data-category]&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; {
      applyCategorySearch(button.dataset.category, button.dataset.topic || &quot;&quot;);
    });
  });
}

function applyCategorySearch(category, topic) {
  activeFilter = category;
  activeTopic = topic;
  activeTopicTerms = topic ? getTopicTerms(topic) : [];
  searchTerm = &quot;&quot;;
  searchInput.value = topic;
  filters.forEach((item) =&gt; item.classList.toggle(&quot;active&quot;, item.dataset.filter === category));
  categoryGrid.querySelectorAll(&quot;[data-topic]&quot;).forEach((item) =&gt; item.classList.toggle(&quot;active&quot;, item.dataset.topic === topic));
  renderRecipes();
  document.querySelector(&quot;#receitas&quot;).scrollIntoView({ behavior: &quot;smooth&quot; });
}

function getTopicTerms(topic) {
  return (topicAliases[topic] || [topic]).map((term) =&gt; term.toLowerCase());
}

function renderDailyRecipe() {
  const today = new Date();
  const startOfYear = new Date(today.getFullYear(), 0, 0);
  const dayOfYear = Math.floor((today - startOfYear) / 86400000);
  dailyRecipe = recipes[dayOfYear % recipes.length];
  document.querySelector(&quot;#dailyImage&quot;).src = dailyRecipe.image;
  document.querySelector(&quot;#dailyImage&quot;).alt = dailyRecipe.title;
  document.querySelector(&quot;#dailyImage&quot;).onerror = () =&gt; {
    document.querySelector(&quot;#dailyImage&quot;).src = imageByCategory[dailyRecipe.category];
  };
  document.querySelector(&quot;#spotlight-title&quot;).textContent = dailyRecipe.title;
  document.querySelector(&quot;#dailyDescription&quot;).textContent = dailyRecipe.description;
  document.querySelector(&quot;#dailyMeta&quot;).textContent = `${dailyRecipe.time} | ${dailyRecipe.level}`;
}

function renderCarousel() {
  const featuredRecipes = recipes.filter((recipe, index) =&gt; index % 9 === 0).slice(0, 16);
  carouselTrack.innerHTML = featuredRecipes.map((recipe) =&gt; `
    &lt;button class=&quot;carousel-item&quot; type=&quot;button&quot; data-carousel-recipe=&quot;${recipe.id}&quot;&gt;
      &lt;img src=&quot;${recipe.image}&quot; alt=&quot;${recipe.title}&quot; onerror=&quot;this.src=&#39;${imageByCategory[recipe.category]}&#39;&quot;&gt;
      &lt;span class=&quot;carousel-caption&quot;&gt;
        &lt;strong&gt;${recipe.title}&lt;/strong&gt;
        &lt;span&gt;${recipe.category} | ${recipe.time}&lt;/span&gt;
      &lt;/span&gt;
    &lt;/button&gt;
  `).join(&quot;&quot;);

  carouselTrack.querySelectorAll(&quot;[data-carousel-recipe]&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; openRecipe(recipes.find((recipe) =&gt; recipe.id === button.dataset.carouselRecipe)));
  });
}

function renderRecipes() {
  const normalizedTerm = searchTerm.trim().toLowerCase();
  const visibleRecipes = recipes.filter((recipe) =&gt; {
    const matchesFilter = activeFilter === &quot;Todas&quot; || recipe.category === activeFilter;
    const matchesTime =
      activeTime === &quot;Todos&quot; ||
      (activeTime === &quot;Rapido&quot; &amp;&amp; recipe.timeMinutes &lt;= 25) ||
      (activeTime === &quot;Medio&quot; &amp;&amp; recipe.timeMinutes &lt;= 45) ||
      (activeTime === &quot;Longo&quot; &amp;&amp; recipe.timeMinutes &gt; 45);
    const matchesLevel = activeLevel === &quot;Todas&quot; || recipe.level === activeLevel;
    const content = `${recipe.title} ${recipe.category} ${recipe.description} ${recipe.ingredients.join(&quot; &quot;)}`.toLowerCase();
    const matchesSearch = !normalizedTerm || content.includes(normalizedTerm);
    const matchesTopic = activeTopicTerms.length === 0 || activeTopicTerms.some((term) =&gt; content.includes(term));
    return matchesFilter &amp;&amp; matchesTime &amp;&amp; matchesLevel &amp;&amp; matchesSearch &amp;&amp; matchesTopic;
  });

  recipeCount.textContent = `${visibleRecipes.length} receita${visibleRecipes.length === 1 ? &quot;&quot; : &quot;s&quot;} encontrada${visibleRecipes.length === 1 ? &quot;&quot; : &quot;s&quot;}${activeTopic ? ` em ${activeTopic}` : &quot;&quot;}`;

  recipeGrid.innerHTML = visibleRecipes.length
    ? visibleRecipes.map((recipe) =&gt; `
      &lt;article class=&quot;recipe-card&quot;&gt;
        &lt;img src=&quot;${recipe.image}&quot; alt=&quot;${recipe.title}&quot; onerror=&quot;this.src=&#39;${imageByCategory[recipe.category]}&#39;&quot;&gt;
        &lt;div class=&quot;recipe-card-content&quot;&gt;
          &lt;p class=&quot;eyebrow&quot;&gt;${recipe.category}&lt;/p&gt;
          &lt;h3&gt;${recipe.title}&lt;/h3&gt;
          &lt;p&gt;${recipe.description}&lt;/p&gt;
          &lt;div class=&quot;meta&quot;&gt;
            &lt;span&gt;${recipe.time}&lt;/span&gt;
            &lt;span&gt;${recipe.level}&lt;/span&gt;
            &lt;span&gt;${recipe.servings}&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;card-actions&quot;&gt;
            &lt;button type=&quot;button&quot; data-recipe=&quot;${recipe.id}&quot;&gt;Ver receita&lt;/button&gt;
            &lt;button class=&quot;favorite-button ${favorites.includes(recipe.id) ? &quot;active&quot; : &quot;&quot;}&quot; type=&quot;button&quot; data-favorite=&quot;${recipe.id}&quot;&gt;
              ${favorites.includes(recipe.id) ? &quot;Favorita&quot; : &quot;Favoritar&quot;}
            &lt;/button&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/article&gt;
    `).join(&quot;&quot;)
    : `&lt;p class=&quot;empty&quot;&gt;Nenhuma receita encontrada. Tente outro termo ou categoria.&lt;/p&gt;`;

  recipeGrid.querySelectorAll(&quot;[data-recipe]&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; openRecipe(recipes.find((recipe) =&gt; recipe.id === button.dataset.recipe)));
  });

  recipeGrid.querySelectorAll(&quot;[data-favorite]&quot;).forEach((button) =&gt; {
    button.addEventListener(&quot;click&quot;, () =&gt; toggleFavorite(button.dataset.favorite));
  });
}

function renderFavorites() {
  const favoriteRecipes = recipes.filter((recipe) =&gt; favorites.includes(recipe.id));
  favoritesList.innerHTML = favoriteRecipes.length
    ? favoriteRecipes.map((recipe) =&gt; `
      &lt;article class=&quot;favorite-item&quot;&gt;
        &lt;strong&gt;${recipe.title}&lt;/strong&gt;
        &lt;span&gt;${recipe.category} | ${recipe.time} | ${recipe.level}&lt;/span&gt;
      &lt;/article&gt;
    `).join(&quot;&quot;)
    : `&lt;p class=&quot;empty&quot;&gt;Suas receitas favoritas vao aparecer aqui.&lt;/p&gt;`;
}

function openRecipe(recipe) {
  if (!recipe) return;
  document.querySelector(&quot;#detailImage&quot;).src = recipe.image;
  document.querySelector(&quot;#detailImage&quot;).alt = recipe.title;
  document.querySelector(&quot;#detailImage&quot;).onerror = () =&gt; {
    document.querySelector(&quot;#detailImage&quot;).src = imageByCategory[recipe.category];
  };
  document.querySelector(&quot;#detailCategory&quot;).textContent = recipe.category;
  document.querySelector(&quot;#detailTitle&quot;).textContent = recipe.title;
  document.querySelector(&quot;#detailDescription&quot;).textContent = recipe.description;
  document.querySelector(&quot;#detailTime&quot;).textContent = recipe.time;
  document.querySelector(&quot;#detailLevel&quot;).textContent = recipe.level;
  document.querySelector(&quot;#detailServings&quot;).textContent = recipe.servings;
  document.querySelector(&quot;#detailIngredients&quot;).innerHTML = recipe.ingredients.map((item) =&gt; `&lt;li&gt;${item}&lt;/li&gt;`).join(&quot;&quot;);
  document.querySelector(&quot;#detailSteps&quot;).innerHTML = recipe.steps.map((step) =&gt; `&lt;li&gt;${step}&lt;/li&gt;`).join(&quot;&quot;);
  detail.classList.add(&quot;open&quot;);
}

function toggleFavorite(id) {
  favorites = favorites.includes(id) ? favorites.filter((favorite) =&gt; favorite !== id) : [...favorites, id];
  localStorage.setItem(&quot;portalReceitasFaceisFavoritas&quot;, JSON.stringify(favorites));
  renderRecipes();
  renderFavorites();
}

filters.forEach((button) =&gt; {
  button.addEventListener(&quot;click&quot;, () =&gt; {
    filters.forEach((item) =&gt; item.classList.remove(&quot;active&quot;));
    button.classList.add(&quot;active&quot;);
    activeFilter = button.dataset.filter;
    activeTopic = &quot;&quot;;
    activeTopicTerms = [];
    categoryGrid.querySelectorAll(&quot;[data-topic]&quot;).forEach((item) =&gt; item.classList.remove(&quot;active&quot;));
    renderRecipes();
  });
});

searchForm.addEventListener(&quot;submit&quot;, (event) =&gt; {
  event.preventDefault();
  searchTerm = searchInput.value;
  renderRecipes();
  document.querySelector(&quot;#receitas&quot;).scrollIntoView({ behavior: &quot;smooth&quot; });
});

searchInput.addEventListener(&quot;input&quot;, () =&gt; {
  searchTerm = searchInput.value;
  activeTopic = &quot;&quot;;
  activeTopicTerms = [];
  categoryGrid.querySelectorAll(&quot;[data-topic]&quot;).forEach((item) =&gt; item.classList.remove(&quot;active&quot;));
  renderRecipes();
});

timeFilter.addEventListener(&quot;change&quot;, () =&gt; {
  activeTime = timeFilter.value;
  renderRecipes();
});

levelFilter.addEventListener(&quot;change&quot;, () =&gt; {
  activeLevel = levelFilter.value;
  renderRecipes();
});

clearTopic.addEventListener(&quot;click&quot;, () =&gt; {
  activeTopic = &quot;&quot;;
  activeTopicTerms = [];
  searchTerm = &quot;&quot;;
  searchInput.value = &quot;&quot;;
  categoryGrid.querySelectorAll(&quot;[data-topic]&quot;).forEach((item) =&gt; item.classList.remove(&quot;active&quot;));
  renderRecipes();
});

dailyButton.addEventListener(&quot;click&quot;, () =&gt; openRecipe(dailyRecipe));
carouselPrev.addEventListener(&quot;click&quot;, () =&gt; carouselTrack.scrollBy({ left: -360, behavior: &quot;smooth&quot; }));
carouselNext.addEventListener(&quot;click&quot;, () =&gt; carouselTrack.scrollBy({ left: 360, behavior: &quot;smooth&quot; }));
closeDetail.addEventListener(&quot;click&quot;, () =&gt; detail.classList.remove(&quot;open&quot;));
document.addEventListener(&quot;keydown&quot;, (event) =&gt; {
  if (event.key === &quot;Escape&quot;) detail.classList.remove(&quot;open&quot;);
});

document.querySelector(&quot;#totalRecipes&quot;).textContent = recipes.length;
renderCategories();
renderDailyRecipe();
renderCarousel();
renderRecipes();
renderFavorites();

&lt;/script&gt;

&lt;/html&gt;
